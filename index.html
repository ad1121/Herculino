<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle Financeiro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

  <div class="max-w-7xl mx-auto p-4 md:p-6">

    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
      <div>
        <h1 class="text-3xl font-bold">Controle Financeiro</h1>
        <p class="text-slate-500">Gerencie entradas, saídas e acompanhe seus resultados.</p>
      </div>

      <button onclick="abrirModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-semibold shadow-lg transition">
        + Novo Lançamento
      </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">

      <div class="bg-white rounded-2xl shadow p-5 border-l-4 border-green-500">
        <p class="text-slate-500 text-sm">Entradas</p>
        <h2 id="totalEntradas" class="text-3xl font-bold text-green-600 mt-2">R$ 0,00</h2>
      </div>

      <div class="bg-white rounded-2xl shadow p-5 border-l-4 border-red-500">
        <p class="text-slate-500 text-sm">Saídas</p>
        <h2 id="totalSaidas" class="text-3xl font-bold text-red-600 mt-2">R$ 0,00</h2>
      </div>

      <div class="bg-white rounded-2xl shadow p-5 border-l-4 border-blue-500">
        <p class="text-slate-500 text-sm">Saldo Atual</p>
        <h2 id="saldoAtual" class="text-3xl font-bold text-blue-600 mt-2">R$ 0,00</h2>
      </div>

    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <div class="lg:col-span-2 bg-white rounded-2xl shadow p-5">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-4">
          <h2 class="text-xl font-bold">Movimentações</h2>

          <input
            type="text"
            id="filtro"
            placeholder="Buscar descrição..."
            class="border rounded-xl px-4 py-2 w-full md:w-72"
            onkeyup="renderizarTabela()"
          />
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b">
                <th class="text-left py-3">Data</th>
                <th class="text-left py-3">Descrição</th>
                <th class="text-left py-3">Categoria</th>
                <th class="text-left py-3">Tipo</th>
                <th class="text-left py-3">Valor</th>
                <th class="text-center py-3">Ações</th>
              </tr>
            </thead>

            <tbody id="tabelaLancamentos"></tbody>
          </table>
        </div>
      </div>

      <div class="bg-white rounded-2xl shadow p-5">
        <h2 class="text-xl font-bold mb-4">Resumo Financeiro</h2>

        <canvas id="grafico"></canvas>

        <div class="mt-6 space-y-3 text-sm">
          <div class="flex justify-between">
            <span>Total de registros</span>
            <span id="qtdRegistros" class="font-bold">0</span>
          </div>

          <div class="flex justify-between">
            <span>Última atualização</span>
            <span id="ultimaAtualizacao" class="font-bold">-</span>
          </div>
        </div>

        <div class="mt-6">
          <button onclick="exportarJSON()" class="w-full bg-slate-800 hover:bg-slate-900 text-white py-3 rounded-xl font-semibold">
            Exportar Dados
          </button>
        </div>
      </div>

    </div>
  </div>

  <div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">

    <div class="bg-white w-full max-w-lg rounded-2xl p-6 shadow-2xl">

      <div class="flex justify-between items-center mb-5">
        <h2 class="text-2xl font-bold">Novo Lançamento</h2>

        <button onclick="fecharModal()" class="text-slate-500 text-xl">
          ✕
        </button>
      </div>

      <div class="space-y-4">

        <input id="descricao" type="text" placeholder="Descrição" class="w-full border rounded-xl px-4 py-3" />

        <input id="valor" type="number" step="0.01" placeholder="Valor" class="w-full border rounded-xl px-4 py-3" />

        <input id="data" type="date" class="w-full border rounded-xl px-4 py-3" />

        <input id="categoria" type="text" placeholder="Categoria" class="w-full border rounded-xl px-4 py-3" />

        <select id="tipo" class="w-full border rounded-xl px-4 py-3">
          <option value="entrada">Entrada</option>
          <option value="saida">Saída</option>
        </select>

        <button onclick="salvarLancamento()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold">
          Salvar Lançamento
        </button>

      </div>
    </div>
  </div>

  <script>

    let lancamentos = JSON.parse(localStorage.getItem('lancamentos')) || [];
    let grafico;

    function abrirModal() {
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    }

    function fecharModal() {
      document.getElementById('modal').classList.remove('flex');
      document.getElementById('modal').classList.add('hidden');
    }

    function salvarLancamento() {

      const descricao = document.getElementById('descricao').value;
      const valor = parseFloat(document.getElementById('valor').value);
      const data = document.getElementById('data').value;
      const categoria = document.getElementById('categoria').value;
      const tipo = document.getElementById('tipo').value;

      if (!descricao || !valor || !data || !categoria) {
        alert('Preencha todos os campos.');
        return;
      }

      const novo = {
        id: Date.now(),
        descricao,
        valor,
        data,
        categoria,
        tipo
      };

      lancamentos.push(novo);

      localStorage.setItem('lancamentos', JSON.stringify(lancamentos));

      sincronizarGoogleSheets(novo);

      renderizarTabela();
      atualizarResumo();
      atualizarGrafico();

      fecharModal();

      document.getElementById('descricao').value = '';
      document.getElementById('valor').value = '';
      document.getElementById('data').value = '';
      document.getElementById('categoria').value = '';
    }

    function renderizarTabela() {

      const tabela = document.getElementById('tabelaLancamentos');
      const filtro = document.getElementById('filtro').value.toLowerCase();

      tabela.innerHTML = '';

      const filtrados = lancamentos.filter(item =>
        item.descricao.toLowerCase().includes(filtro)
      );

      filtrados.reverse().forEach(item => {

        tabela.innerHTML += `
          <tr class="border-b hover:bg-slate-50">
            <td class="py-3">${formatarData(item.data)}</td>
            <td class="py-3">${item.descricao}</td>
            <td class="py-3">${item.categoria}</td>
            <td class="py-3">
              <span class="px-3 py-1 rounded-full text-white text-xs ${item.tipo === 'entrada' ? 'bg-green-500' : 'bg-red-500'}">
                ${item.tipo}
              </span>
            </td>
            <td class="py-3 font-bold ${item.tipo === 'entrada' ? 'text-green-600' : 'text-red-600'}">
              R$ ${item.valor.toFixed(2)}
            </td>
            <td class="py-3 text-center">
              <button onclick="removerLancamento(${item.id})" class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg text-xs">
                Excluir
              </button>
            </td>
          </tr>
        `;
      });
    }

    function removerLancamento(id) {

      if (!confirm('Deseja remover este lançamento?')) {
        return;
      }

      lancamentos = lancamentos.filter(item => item.id !== id);

      localStorage.setItem('lancamentos', JSON.stringify(lancamentos));

      renderizarTabela();
      atualizarResumo();
      atualizarGrafico();
    }

    function atualizarResumo() {

      const entradas = lancamentos
        .filter(item => item.tipo === 'entrada')
        .reduce((acc, item) => acc + item.valor, 0);

      const saidas = lancamentos
        .filter(item => item.tipo === 'saida')
        .reduce((acc, item) => acc + item.valor, 0);

      const saldo = entradas - saidas;

      document.getElementById('totalEntradas').innerText = formatarMoeda(entradas);
      document.getElementById('totalSaidas').innerText = formatarMoeda(saidas);
      document.getElementById('saldoAtual').innerText = formatarMoeda(saldo);
      document.getElementById('qtdRegistros').innerText = lancamentos.length;

      document.getElementById('ultimaAtualizacao').innerText = new Date().toLocaleString('pt-BR');
    }

    function atualizarGrafico() {

      const entradas = lancamentos
        .filter(item => item.tipo === 'entrada')
        .reduce((acc, item) => acc + item.valor, 0);

      const saidas = lancamentos
        .filter(item => item.tipo === 'saida')
        .reduce((acc, item) => acc + item.valor, 0);

      const ctx = document.getElementById('grafico');

      if (grafico) {
        grafico.destroy();
      }

      grafico = new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels: ['Entradas', 'Saídas'],
          datasets: [{
            data: [entradas, saidas]
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true
        }
      });
    }

    function formatarMoeda(valor) {
      return valor.toLocaleString('pt-BR', {
        style: 'currency',
        currency: 'BRL'
      });
    }

    function formatarData(data) {
      return new Date(data).toLocaleDateString('pt-BR');
    }

    function exportarJSON() {

      const dataStr = JSON.stringify(lancamentos, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });

      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');

      a.href = url;
      a.download = 'controle-financeiro.json';
      a.click();
    }

    async function sincronizarGoogleSheets(dados) {

      // CRIE UM GOOGLE APPS SCRIPT
      // PUBLIQUE COMO WEB APP
      // COLE A URL ABAIXO

      const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbzFuFWYwZyEIvaEUyF8xbBymzTaLOofnx5JUk4hbvMZhRH3yMYjTCFj4F12OLaoWosJjw/exec';

      if (WEBHOOK_URL === 'https://script.google.com/macros/s/AKfycbzFuFWYwZyEIvaEUyF8xbBymzTaLOofnx5JUk4hbvMZhRH3yMYjTCFj4F12OLaoWosJjw/exec') {
        return;
      }

      try {

        await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(dados)
        });

      } catch (error) {
        console.error('Erro ao sincronizar:', error);
      }
    }

    renderizarTabela();
    atualizarResumo();
    atualizarGrafico();

  </script>
</body>
</html>
